services:
  - type: web
    name: bhutan-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set this manually in Render dashboard
      - key: GEMINI_MODEL_NAME
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: "3.11.9"
